<!DOCTYPE html>
<html>
<head>
  <title>PassVault Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">PassVault</div>
  <div class="nav">
    <a href="/">Login</a>
  </div>
</div>

<div class="main">
  <div class="card">
    <h2>Login</h2>

    <form action="/login" method="post">
      <input type="text" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Master Password" required>
      <input type="hidden" id="latitude" name="latitude">
      <input type="hidden" id="longitude" name="longitude">
      <p id="locationStatus" class="location-status">Checking login location securely...</p>
      <button type="submit">Login</button>
    </form>

    <hr style="margin:20px 0;">

    <h3>Register</h3>
    <form action="/register" method="post">
      <input type="text" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
  </div>
</div>

<script>
  const statusText = document.getElementById("locationStatus");
  const latitudeInput = document.getElementById("latitude");
  const longitudeInput = document.getElementById("longitude");

  if (!navigator.geolocation) {
    statusText.textContent = "Location is unavailable in this browser. Login will continue without location risk analysis.";
  } else {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        latitudeInput.value = position.coords.latitude;
        longitudeInput.value = position.coords.longitude;
        statusText.textContent = "Login location captured for suspicious-login detection.";
      },
      () => {
        statusText.textContent = "Location permission was not granted. Login will continue without location risk analysis.";
      },
      {
        enableHighAccuracy: false,
        timeout: 8000,
        maximumAge: 300000
      }
    );
  }
</script>

</body>
</html>
