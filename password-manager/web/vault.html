<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🔐 PassVault</div>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/vault">Vault</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="main">

  <h2>Vault</h2>

  <!-- 🔍 SEARCH -->
  <input class="search" id="search" placeholder="Search websites...">

  <!-- 🔐 GENERATOR -->
  <div class="card">
    <h3>Password Generator</h3>

    <div class="row">

      <!-- LENGTH DROPDOWN -->
      <select id="genLength">
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="10">10</option>
        <option value="12" selected>12 (Recommended)</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
      </select>

      <label>
        <input type="checkbox" id="symbols" checked> Symbols
      </label>

      <button onclick="generate()">Generate</button>
    </div>

    <p id="genHint" style="font-size:12px;color:#94a3b8;margin-top:8px;">
      12+ characters recommended for strong passwords
    </p>

    <div class="generated-box">
      <span id="generated">Click generate</span>
      <button onclick="copyGenerated()">Copy</button>
    </div>
  </div>

  <!-- ➕ ADD PASSWORD -->
  <div class="card">
    <h3>Add Password</h3>
    <form action="/addPassword" method="post" class="row">
      <input name="website" placeholder="Website" required>
      <input name="username" placeholder="Username" required>
      <input name="password" placeholder="Password" required>
      <button type="submit">Save</button>
    </form>
  </div>

  <!-- 📋 TABLE -->
  <div class="card">
    <table id="table">
      <tr>
        <th>Website</th>
        <th>Username</th>
        <th>Password</th>
        <th>Strength</th>
        <th>Actions</th>
      </tr>

      {{ROWS}}

    </table>
  </div>

</div>

<script>

// 🔍 SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let val = this.value.toLowerCase();
  let rows = document.querySelectorAll("#table tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

// 🔓 TOGGLE PASSWORD
function toggle(btn, enc) {
  let cell = btn.parentElement.parentElement.children[2];

  if (cell.dataset.revealed === "true") {
    cell.innerText = "••••••";
    cell.dataset.revealed = "false";
    btn.innerText = "Show";
    return;
  }

  fetch("/reveal?data=" + encodeURIComponent(enc))
    .then(res => res.text())
    .then(pass => {
      cell.innerText = pass;
      cell.dataset.revealed = "true";
      btn.innerText = "Hide";
    });
}

// 🔐 GENERATOR
function generate() {
  let len = parseInt(document.getElementById("genLength").value);
  let sym = document.getElementById("symbols").checked;

  fetch(`/generate?len=${len}&sym=${sym}`)
    .then(res => res.text())
    .then(pass => {
      document.getElementById("generated").innerText = pass;
    });
}

// 📋 COPY
function copyGenerated() {
  let text = document.getElementById("generated").innerText;
  navigator.clipboard.writeText(text);
}

// 💡 LENGTH FEEDBACK
document.getElementById("genLength").addEventListener("change", function() {
  let len = parseInt(this.value);
  let hint = document.getElementById("genHint");

  if (len < 10) {
    hint.innerText = "Short passwords are easier to crack";
    hint.style.color = "#dc2626";
  } else if (len < 14) {
    hint.innerText = "Decent, but longer is safer";
    hint.style.color = "#ca8a04";
  } else {
    hint.innerText = "Strong password length";
    hint.style.color = "#16a34a";
  }
});

</script>

</body>
</html>
