<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🔐 PassVault</div>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/vault">Vault</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="main">

  <h2>Vault</h2>

  <!-- 🔍 SEARCH -->
  <input class="search" id="search" placeholder="Search websites...">

  <!-- 🔐 GENERATOR (CLEAN) -->
  <div class="card">
    <h3>Password Generator</h3>

    <div class="row">
      <input id="genLength" type="number" placeholder="Length (12 recommended)">
      <label><input type="checkbox" id="symbols"> Symbols</label>
      <button onclick="generate()">Generate</button>
    </div>

    <div class="generated-box">
      <span id="generated">Click generate</span>
      <button onclick="copyGenerated()">Copy</button>
    </div>
  </div>

  <!-- ➕ ADD PASSWORD -->
  <div class="card">
    <h3>Add Password</h3>
    <form action="/addPassword" method="post" class="row">
      <input name="website" placeholder="Website" required>
      <input name="username" placeholder="Username" required>
      <input name="password" placeholder="Password" required>
      <button type="submit">Save</button>
    </form>
  </div>

  <!-- 📋 TABLE -->
  <div class="card">
    <table id="table">
      <tr>
        <th>Website</th>
        <th>Username</th>
        <th>Password</th>
        <th>Strength</th>
        <th>Actions</th>
      </tr>

      {{ROWS}}

    </table>
  </div>

</div>

<script>

// 🔍 SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let val = this.value.toLowerCase();
  let rows = document.querySelectorAll("#table tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

// 🔓 TOGGLE PASSWORD (CLEAN VERSION)
function toggle(btn, enc) {
  let cell = btn.parentElement.parentElement.children[2];

  if (cell.dataset.revealed === "true") {
    cell.innerText = "••••••";
    cell.dataset.revealed = "false";
    btn.innerText = "Show";
    return;
  }

  fetch("/reveal?data=" + encodeURIComponent(enc))
    .then(res => res.text())
    .then(pass => {
      cell.innerText = pass;
      cell.dataset.revealed = "true";
      btn.innerText = "Hide";
    });
}

// 🔐 GENERATOR
function generate() {
  let len = document.getElementById("genLength").value || 12;
  let sym = document.getElementById("symbols").checked;

  fetch(`/generate?len=${len}&sym=${sym}`)
    .then(res => res.text())
    .then(pass => {
      document.getElementById("generated").innerText = pass;
    });
}

// 📋 COPY
function copyGenerated() {
  let text = document.getElementById("generated").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
